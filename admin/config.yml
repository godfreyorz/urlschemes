backend:
  name: github
  repo: godfreyorz/urlschemes
  branch: main
  squash_merges: false
  base_url: https://ulrschemes.pages.dev
  auth_endpoint: /api/callback

media_folder: static/upload
public_folder: /upload

collections:
  - name: sources
    label: 🔍 搜索源配置
    files:
      - name: sources
        label: 搜索源配置列表
        file: sources.json
        format: json
        fields:
          - label: 搜索源列表
            name: sources
            widget: list
            summary: "{{fields.order}}. {{fields.name}}"
            collapsed: true
            allow_add: true
            fields:
              - label: 平台名称
                name: name
                widget: string
                hint: 显示在搜索列表中的名称，如"百度"、"Google"

              - label: 图标标识 iconName
                name: iconName
                widget: string
                hint: 参考 SF Symbols 命名，如 globe、magnifyingglass、film.fill

              - label: 搜索链接模板 urlScheme
                name: urlScheme
                widget: text
                pattern:
                  - '.*\{query\}.*'
                  - 链接中必须包含 {query} 占位符
                hint: 关键词占位符固定使用 {query}，支持网页链接、App 跳转协议（如 sinaweibo://、bilibili://）

              - label: 展示排序 order
                name: order
                widget: number
                value_type: int
                min: 0
                max: 99
                hint: 数字越小越靠前，建议从 0 开始递增
